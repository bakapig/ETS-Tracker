# Fly.io — KTMB Live Malaysia API
# Docs: https://fly.io/docs/languages-and-frameworks/dockerfile/
#
# First time (from backend/):
#   .\scripts\deploy-fly.ps1 -FirstTime
#
# Redeploy:
#   .\scripts\deploy-fly.ps1

app = "ktmb-live-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  USER_AGENT = "KTMB-Live-Malaysia/1.0 (Fly.io; contact: dev@example.com)"
  # Web only — mobile apps ignore CORS. Add your site when you deploy web.
  CORS_ORIGINS = ""

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "15s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Optional: persist GTFS zip across deploys (create volume first):
#   fly volumes create ktmb_data --region sin --size 1 -a ktmb-live-api
# [[mounts]]
#   source = "ktmb_data"
#   destination = "/app/data"
